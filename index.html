<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee Fashion 女装热销品清单</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #EE4D2D; 
            --primary-light: #fff5f2;
            --primary-dark: #d73211;
            --accent: #F4A855;
            --accent2: #7C6BED;
            --bg: #faf8f9;
            --card-bg: #ffffff;
            --text: #2d2038;
            --text-muted: #9b8fa0;
            --border: #f0e8ed;
            --success: #27ae60;
            --success-bg: #eafaf1;
            --info: #2980b9;
            --info-bg: #eaf4fb;
            --tag-bg: #fff3f7;
            --danger: #eb4d4b;
            --danger-bg: #fff1f0;
            --shadow: 0 2px 16px rgba(238,77,45,0.07);
            --shadow-hover: 0 8px 32px rgba(238,77,45,0.16);
            --radius: 16px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', 'PingFang SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #FF6633 0%, #EE4D2D 50%, #D02D11 100%);
            color: white;
            padding: 36px 40px 28px;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute; top: -60px; right: -60px;
            width: 280px; height: 280px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }
        .header-inner { max-width: 1280px; margin: 0 auto; position: relative; z-index: 1; }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 .badge {
            background: rgba(255,255,255,0.25);
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .header-desc {
            margin-top: 14px;
            background: rgba(0,0,0,0.1);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            line-height: 1.8;
            max-width: 700px;
            border-left: 3px solid rgba(255,255,255,0.7);
        }
        
        .last-update-tag {
            position: absolute;
            top: 20px;
            right: 40px;
            background: rgba(255,255,255,0.15);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .container { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

        .filter-section {
            background: var(--card-bg);
            padding: 20px 24px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .filter-row + .filter-row { margin-top: 12px; }
        .filter-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        input[type="text"], input[type="number"], select {
            padding: 9px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--text);
            background: var(--bg);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        
        .switch-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            cursor: pointer;
        }
        .switch-container input { cursor: pointer; }

        .count-badge {
            margin-left: auto;
            background: var(--primary-light);
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 20px;
        }
        .btn-clear {
            padding: 9px 16px;
            background: transparent;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-clear:hover { border-color: var(--primary); color: var(--primary); }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: #ffd6cc;
        }

        .site-tag {
            position: absolute; top: 10px; left: 10px;
            background: var(--primary);
            color: white;
            font-size: 10px; font-weight: 700;
            padding: 3px 8px; border-radius: 20px;
            z-index: 10;
        }
        .special-tag {
            position: absolute; top: 10px; right: 10px;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            color: white;
            font-size: 10px; font-weight: 700;
            padding: 3px 8px; border-radius: 20px;
            z-index: 10;
        }

        .img-container {
            width: 100%; height: 220px;
            background: #fffafa;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: zoom-in;
        }
        .img-container img {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            transition: transform 0.4s ease;
        }

        .info { padding: 14px 16px; flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }

        .item-title {
            font-weight: 600; font-size: 14px; line-height: 1.45; height: 40px;
            overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            color: var(--text);
        }

        .price-row { display: flex; align-items: baseline; gap: 6px; }
        .price-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
        .price-value { color: var(--primary); font-size: 18px; font-weight: 700; }

        .meta-row { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
        .pill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; border: 1px solid transparent; }
        .pill-seller-cncb { background: #f0f0ff; color: var(--accent2); border-color: #d4d0f8; }
        .pill-seller-local { background: #fff7ed; color: #c45e00; border-color: #fad9b0; }
        .pill-official { background: #fff8dc; color: #8a6000; border-color: #f0d070; }
        .pill-cat { background: var(--tag-bg); color: var(--primary-dark); border-color: #f5c5d2; }
        .pill-ado-pos { background: #f0fff4; color: #1a7a40; border-color: #b2dfca; }
        .pill-ado-neg { background: var(--danger-bg); color: var(--danger); border-color: #facdcd; }

        .stats-row { display: flex; gap: 8px; }
        .stat-box {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 6px 10px; text-align: center;
        }
        .stat-label { font-size: 10px; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; }
        .stat-value { font-size: 12px; font-weight: 700; white-space: nowrap; }
        .stat-value.sales-val { color: var(--success); }
        .stat-value.revenue-val { color: var(--info); }

        .footer-row {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid var(--border); padding-top: 10px; margin-top: auto;
            font-size: 11px; color: var(--text-muted);
        }
        .itemid-box {
            font-family: monospace; background: var(--bg); padding: 2px 7px;
            border-radius: 4px; border: 1px dashed #ddd; cursor: pointer;
        }

        #imageModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; cursor: zoom-out;
        }
        #imageModal img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: #333; color: white; padding: 10px 22px; border-radius: 30px;
            font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 10000;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .pagination { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 32px 0; }
        .pagination button { padding: 8px 16px; border: 1.5px solid var(--border); background: white; cursor: pointer; border-radius: var(--radius-sm); }
        
        footer { text-align: center; color: var(--text-muted); font-size: 11px; padding: 40px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <h1>👗 Shopee Fashion 女装选品清单 <span class="badge">External</span></h1>
        <div class="header-desc">
            ✨ <strong>精选热销品新品</strong> · 涵盖多站点，帮你快速锁定爆款选品<br>
            📊 当前页面仅供内部选品参考，不提供外部商品跳转链接。
       </div>
        <div class="last-update-tag" id="lastUpdateDisplay">数据更新中...</div>
    </div>
</header>

<div class="container">
    <div class="filter-section">
        <div class="filter-row">
            <span class="filter-label">🔍</span>
            <input type="text" id="searchInput" placeholder="搜索标题 / ID..." oninput="debouncedFilter()">
            
            <select id="l1Filter" onchange="updateL2(); applyFilters()">
                <option value="">L1 类目</option>
            </select>
            <select id="l2Filter" onchange="updateL3(); applyFilters()">
                <option value="">L2 类目</option>
            </select>
            <select id="l3Filter" onchange="applyFilters()">
                <option value="">L3 类目</option>
            </select>

            <span class="filter-label">价格 (USD)</span>
            <input type="number" id="minPrice" placeholder="Min" oninput="debouncedFilter()" style="width:70px;">
            <input type="number" id="maxPrice" placeholder="Max" oninput="debouncedFilter()" style="width:70px;">
            
            <select id="sortOrder" onchange="applyFilters()">
                <option value="dateDesc">日期倒序 (最新) ↑</option>
                <option value="default">默认排序</option>
                <option value="priceAsc">价格 ↑</option>
                <option value="priceDesc">价格 ↓</option>
            </select>
            
            <button class="btn-clear" onclick="clearFilters()">✕ 重置</button>
            <span class="count-badge" id="countDisplay">—</span>
        </div>
        
        <div class="filter-row">
            <span class="filter-label">🌏 站点</span>
            <select id="siteFilter" onchange="applyFilters()">
                <option value="">全部站点</option>
                <option value="BR">BR</option><option value="MX">MX</option><option value="MY">MY</option>
                <option value="PH">PH</option><option value="SG">SG</option><option value="TH">TH</option>
                <option value="TW">TW</option><option value="VN">VN</option>
            </select>
            <span class="filter-label">👤 卖家</span>
            <select id="sellerTypeFilter" onchange="applyFilters()">
                <option value="">全部类型</option>
                <option value="CNCB">CNCB</option>
                <option value="Local">Local</option>
            </select>

            <span class="filter-label">🔥 Top New SKU</span>
            <select id="topNewFilter" onchange="applyFilters()">
                <option value="">All</option>
                <option value="Y">Y</option>
                <option value="N">N</option>
            </select>
        </div>
    </div>

    <div class="product-grid" id="productGrid"></div>
    <div class="pagination" id="pagination"></div>
</div>

<div id="imageModal" onclick="this.style.display='none'"><img id="modalImg" src=""></div>
<div id="toast"></div>

<footer>Shopee Fashion Internal Selection System</footer>

<script>
    let products = [], filteredData = [], currentPage = 1;
    const pageSize = 40;

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    const clean = (s) => (s || "").toString().replace(/[算法"=\t]/g, '').trim();
    const toNum = (s) => parseFloat(clean(s)) || 0;

    const mapData = (arr) => {
        return {
            title: clean(arr[0]), price_min: toNum(arr[1]), price_max: toNum(arr[2]),
            imgUrl: clean(arr[3]), link: clean(arr[4]), l1: clean(arr[5]), l2: clean(arr[6]),
            update_date: clean(arr[7]), itemid: clean(arr[8]), tag: clean(arr[9]),
            site: clean(arr[10]), seller_type: clean(arr[11]), is_official_shop: clean(arr[12]),
            daily_sales_min: toNum(arr[13]), daily_sales_max: toNum(arr[14]),
            daily_rev_min: toNum(arr[15]), daily_rev_max: toNum(arr[16]),
            ado_mom: clean(arr[17]),
            l3: clean(arr[18]),
            local_price_min: toNum(arr[19]), local_price_max: toNum(arr[20]),
            is_new_sku: clean(arr[21]),
            currency: clean(arr[22]) || ''
        };
    };

    function fmtRange(min, max, prefix = '', suffix = '') {
        if (!min && !max) return '—';
        if (min === max || !max) return `${prefix}${min.toLocaleString()}${suffix}`;
        return `${prefix}${min.toLocaleString()} ~ ${max.toLocaleString()}${suffix}`;
    }

    async function loadData() {
        try {
            const res = await fetch('data.csv');
            const text = await res.text();
            const rows = text.split(/\r?\n/).filter(l => l.trim());
            products = rows.slice(1).map(line => {
                let r = [], cur = '', q = false;
                for (let c of line) {
                    if (c === '"') q = !q;
                    else if (c === ',' && !q) { r.push(cur.trim()); cur = ''; }
                    else cur += c;
                }
                r.push(cur.trim());
                return r;
            }).filter(a => a[0]);

            const dates = products.map(p => new Date(clean(p[7]))).filter(d => !isNaN(d));
            if (dates.length > 0) {
                const latest = new Date(Math.max(...dates));
                document.getElementById('lastUpdateDisplay').textContent = `数据最后更新: ${latest.toLocaleDateString()}`;
            }

            initFilters();
            applyFilters();
        } catch (e) {
            document.getElementById('productGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:50px;">CSV 加载失败</div>`;
        }
    }

    function initFilters() {
        const l1s = [...new Set(products.map(p => clean(p[5])))].filter(Boolean);
        const l1Filter = document.getElementById('l1Filter');
        l1Filter.innerHTML = '<option value="">L1 类目</option>';
        l1s.sort().forEach(v => l1Filter.innerHTML += `<option value="${v}">${v}</option>`);
        updateL2();
    }

    function updateL2() {
        const l1 = document.getElementById('l1Filter').value;
        const s = document.getElementById('l2Filter');
        s.innerHTML = '<option value="">L2 类目</option>';
        const filteredL2 = [...new Set(products.filter(p => !l1 || clean(p[5]) === l1).map(p => clean(p[6])))].filter(Boolean);
        filteredL2.sort().forEach(v => { s.innerHTML += `<option value="${v}">${v}</option>`; });
        updateL3();
    }

    function updateL3() {
        const l1 = document.getElementById('l1Filter').value;
        const l2 = document.getElementById('l2Filter').value;
        const s = document.getElementById('l3Filter');
        s.innerHTML = '<option value="">L3 类目</option>';
        const filteredL3 = [...new Set(products.filter(p => 
            (!l1 || clean(p[5]) === l1) && 
            (!l2 || clean(p[6]) === l2)
        ).map(p => clean(p[18])))].filter(Boolean);
        filteredL3.sort().forEach(v => { s.innerHTML += `<option value="${v}">${v}</option>`; });
    }

    function render(dataList, page = 1) {
        currentPage = page;
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        const pageData = dataList.slice((page - 1) * pageSize, page * pageSize);

        pageData.forEach(arr => {
            const item = mapData(arr);
            const isNeg = item.ado_mom.includes('-');
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="site-tag">${item.site}</div>
                ${item.is_new_sku === 'Y' ? `<div class="special-tag">New</div>` : ''}
                <div class="img-container" onclick="openModal('${item.imgUrl}')">
                    <img src="${item.imgUrl}" loading="lazy" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                </div>
                <div class="info">
                    <div class="item-title" title="${item.title}">${item.title}</div>
                    <div class="price-row" style="flex-direction:column; align-items:flex-start; gap:2px;">
                        <div class="price-value" style="font-size:16px;">$${fmtRange(item.price_min, item.price_max)} (USD)</div>
                        <div class="price-value" style="font-size:14px; color:var(--text-muted); font-weight:500;">${fmtRange(item.local_price_min, item.local_price_max, item.currency)}</div>
                    </div>
                    <div class="meta-row">
                        ${item.seller_type ? `<span class="pill ${item.seller_type === 'CNCB' ? 'pill-seller-cncb' : 'pill-seller-local'}">${item.seller_type}</span>` : ''}
                        ${item.is_official_shop === 'Y' ? `<span class="pill pill-official">⭐ Official</span>` : ''}
                        ${item.l3 ? `<span class="pill pill-cat">${item.l3}</span>` : (item.l2 ? `<span class="pill pill-cat">${item.l2}</span>` : '')}
                        ${item.ado_mom ? `<span class="pill ${isNeg ? 'pill-ado-neg' : 'pill-ado-pos'}">${isNeg?'📉':'📈'} ${item.ado_mom}</span>` : ''}
                    </div>
                    <div class="footer-row"><span>📅 ${item.update_date}</span></div>
                </div>`;
            grid.appendChild(card);
        });
        renderPagination(dataList.length);
    }

    function openModal(src) { document.getElementById('modalImg').src = src; document.getElementById('imageModal').style.display = 'flex'; }

    function renderPagination(total) {
        const totalPages = Math.ceil(total / pageSize) || 1;
        document.getElementById('pagination').innerHTML = `
            <button onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>←</button>
            <span>${currentPage} / ${totalPages}</span>
            <button onclick="changePage(1)" ${currentPage >= totalPages ? 'disabled' : ''}>→</button>
        `;
    }

    function changePage(d) { render(filteredData, currentPage + d); window.scrollTo(0,0); }

    function applyFilters() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const l1 = document.getElementById('l1Filter').value;
        const l2 = document.getElementById('l2Filter').value;
        const l3 = document.getElementById('l3Filter').value;
        const site = document.getElementById('siteFilter').value;
        const seller = document.getElementById('sellerTypeFilter').value;
        
        // 【新增/修改】获取下拉框选中的值 (All="", Y="Y", N="N")
        const topNewVal = document.getElementById('topNewFilter').value;
        
        const minP = parseFloat(document.getElementById('minPrice').value) || 0;
        const maxP = parseFloat(document.getElementById('maxPrice').value) || Infinity;

        filteredData = products.filter(arr => {
            const i = mapData(arr);
            
            // 【新增/修改】筛选逻辑：如果 topNewVal 为空则不筛选，否则匹配 is_new_sku 字段
            const matchTopNew = !topNewVal || i.is_new_sku === topNewVal;
            
            return (!q || i.title.toLowerCase().includes(q) || i.itemid.includes(q)) &&
                   (!l1 || i.l1 === l1) && (!l2 || i.l2 === l2) && (!l3 || i.l3 === l3) &&
                   (!site || i.site === site) && (!seller || i.seller_type === seller) &&
                   matchTopNew &&
                   (i.price_min >= minP && i.price_min <= maxP);
        });

        const sort = document.getElementById('sortOrder').value;
        if (sort === 'dateDesc') filteredData.sort((a,b) => new Date(clean(b[7])) - new Date(clean(a[7])));
        else if (sort === 'priceAsc') filteredData.sort((a,b) => toNum(a[1]) - toNum(b[1]));
        else if (sort === 'priceDesc') filteredData.sort((a,b) => toNum(b[1]) - toNum(a[1]));

        document.getElementById('countDisplay').textContent = `共 ${filteredData.length} 款`;
        render(filteredData, 1);
    }

    function clearFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('l1Filter').value = '';
        document.getElementById('minPrice').value = '';
        document.getElementById('maxPrice').value = '';
        document.getElementById('siteFilter').value = '';
        document.getElementById('sellerTypeFilter').value = '';
        
        // 【新增/修改】重置时恢复到 All (空值)
        document.getElementById('topNewFilter').value = '';
        
        document.getElementById('sortOrder').value = 'dateDesc';
        updateL2(); applyFilters();
    }

    let timer;
    const debouncedFilter = () => { clearTimeout(timer); timer = setTimeout(applyFilters, 300); };

    window.onload = loadData;
</script>
</body>
</html>
